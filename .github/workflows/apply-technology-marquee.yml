name: Apply technology marquee

on:
  push:
    paths:
      - '.github/workflows/apply-technology-marquee.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject CV technology marquee
        shell: python
        run: |
          from pathlib import Path

          path = Path('site-animations.js')
          text = path.read_text(encoding='utf-8')
          if 'function setupTechnologyMarquee()' in text:
              raise SystemExit(0)

          function = r'''

  function setupTechnologyMarquee() {
    const strip = document.querySelector('.technology-strip');
    const list = strip && strip.querySelector('.technology-list');
    if (!strip || !list) return;

    const tools = [
      'Oracle', 'MySQL', 'PostgreSQL', 'SQL', 'PL/SQL', 'Python', 'Unix Shell', 'Perl',
      'ETL', 'Data Modelling', 'AWS Lambda', 'Amazon RDS', 'Amazon S3', 'Amazon EC2',
      'API Gateway', 'EventBridge', 'CloudWatch', 'Secrets Manager', 'Git', 'JIRA',
      'Postman', 'WinSCP', 'TOAD for Oracle', 'SQL Developer', 'MySQL Workbench',
      'pgAdmin', 'Oracle APEX', 'Oracle EBS R12', 'MuleSoft', 'Confluence',
      'FTP / SFTP', 'UNIX', 'Linux', 'Windows'
    ];

    function initials(name) {
      return name.split(/\s|\//).filter(Boolean).map(function (part) {
        return part[0];
      }).join('').slice(0, 3).toUpperCase();
    }

    const groupMarkup = tools.map(function (tool) {
      return '<span class="technology-marquee-item"><span class="technology-marquee-icon" aria-hidden="true">' + initials(tool) + '</span><span>' + tool + '</span></span>';
    }).join('');

    const track = document.createElement('div');
    track.className = 'technology-marquee-track';
    track.innerHTML = '<div class="technology-marquee-group">' + groupMarkup + '</div><div class="technology-marquee-group" aria-hidden="true">' + groupMarkup + '</div>';
    list.replaceWith(track);

    const style = document.createElement('style');
    style.textContent = `
      .technology-strip{overflow:hidden;padding:34px 0 30px}
      .technology-strip .container{width:100%;max-width:none}
      .technology-label{margin-bottom:20px}
      .technology-marquee-track{display:flex;width:max-content;will-change:transform;animation:technology-marquee 52s linear infinite}
      .technology-marquee-group{display:flex;align-items:center;gap:18px;padding-right:18px}
      .technology-marquee-item{display:inline-flex;min-width:max-content;align-items:center;gap:9px;padding:8px 13px 8px 8px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--muted);font-family:"Space Grotesk",sans-serif;font-size:.75rem;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.12);transition:border-color .2s ease,color .2s ease,transform .2s ease}
      .technology-marquee-item:hover{border-color:rgba(73,215,255,.45);color:var(--text);transform:translateY(-2px)}
      .technology-marquee-icon{display:grid;width:31px;height:31px;place-items:center;border:1px solid rgba(73,215,255,.27);border-radius:50%;background:var(--blue-wash);color:var(--cyan);font-size:.48rem;font-weight:800;letter-spacing:.02em;box-shadow:inset 0 0 12px rgba(73,215,255,.06)}
      .technology-marquee-track:hover{animation-play-state:paused}
      @keyframes technology-marquee{to{transform:translateX(-50%)}}
      @media(max-width:680px){.technology-marquee-track{animation-duration:38s}.technology-marquee-group{gap:12px;padding-right:12px}.technology-marquee-item{font-size:.68rem;padding-right:11px}.technology-marquee-icon{width:28px;height:28px}}
      @media(prefers-reduced-motion:reduce){.technology-marquee-track{width:auto;animation:none;flex-wrap:wrap;justify-content:center}.technology-marquee-group{flex-wrap:wrap;justify-content:center}.technology-marquee-group[aria-hidden="true"]{display:none}}
    `;
    document.head.appendChild(style);
  }
'''

          marker = '  setupArchitectureFlow();'
          if marker not in text:
              raise SystemExit('Setup marker not found')
          text = text.replace(marker, function + '\n' + marker, 1)
          text = text.replace('  setupHeroVisualFixes();', '  setupHeroVisualFixes();\n  setupTechnologyMarquee();', 1)
          path.write_text(text, encoding='utf-8')
      - name: Verify JavaScript
        run: node --check site-animations.js
      - name: Commit marquee
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-animations.js
          git commit -m "Animate complete CV technology stack"
          git push
